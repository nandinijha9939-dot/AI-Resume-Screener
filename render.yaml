services:
  # ===== BACKEND SERVICE =====
  - type: web
    name: ai-resume-screener-backend
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ===== FRONTEND SERVICE =====
  - type: web
    name: ai-resume-screener-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --port $PORT
    envVars:
      - key: VITE_API_URL
        value: https://ai-resume-screener-backend.onrender.com