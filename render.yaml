services:
  # ===== BACKEND SERVICE =====
  - type: web
    name: ai-resume-screener-backend
    runtime: python
    repo: https://github.com/your-username/your-repo  # UPDATE THIS
    plan: starter  # Use starter for more memory (1GB) or free for testing
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: 1

  # ===== FRONTEND SERVICE =====
  - type: web
    name: ai-resume-screener-frontend
    runtime: node
    repo: https://github.com/your-username/your-repo  # UPDATE THIS
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --port $PORT
    envVars:
      - key: VITE_API_URL
        value: https://ai-resume-screener-backend.onrender.com  # UPDATE THIS